services:
  - type: web
    name: document-upload-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # DATABASE_URL must be set in Render dashboard environment variables
      # Format: postgresql://user:password@hostname:5432/database
      # This is automatically provided by Render PostgreSQL service
